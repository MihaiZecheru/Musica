<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <!-- Google Fonts Roboto -->
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
  />
  <!-- MDB ESSENTIAL -->
  <link rel="stylesheet" href="./mdbootstrap/css/mdb.min.css" />
  <!-- MDB PLUGINS -->
  <link rel="stylesheet" href="./mdbootstrap/plugins/css/all.min.css" />
  <!-- MDB ESSENTIAL -->
  <script type="text/javascript" src="./mdbootstrap/js/mdb.min.js" defer></script>
  <!-- MDB PLUGINS -->
  <script type="text/javascript" src="./mdbootstrap/plugins/js/all.min.js" defer></script>
  <title>Musica | Register</title>
</head>
<body>
  <section class="vh-100" style="background-color: #eee;">
    <div class="container h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-lg-12 col-xl-11">
          <div class="card text-black" style="border-radius: 25px;">
            <div class="card-body p-md-5">
              <div class="row justify-content-center">
                <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
  
                  <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">Sign up</p>
  
                  <form class="mx-1 mx-md-4">
  
                    <div class="d-flex flex-row align-items-center mb-4">
                      <i class="fas fa-user fa-lg me-3 fa-fw"></i>
                      <div class="form-outline flex-fill mb-0">
                        <input type="text" id="name-input" class="form-control" />
                        <label class="form-label" for="name-input">Your Name</label>
                      </div>
                    </div>
  
                    <div class="d-flex flex-row align-items-center mb-4">
                      <i class="fas fa-envelope fa-lg me-3 fa-fw"></i>
                      <div class="form-outline flex-fill mb-0">
                        <input type="email" id="email-input" class="form-control" />
                        <label class="form-label" for="email-input">Your Email</label>
                      </div>
                    </div>
  
                    <div class="d-flex flex-row align-items-center mb-4">
                      <i class="fas fa-lock fa-lg me-3 fa-fw"></i>
                      <div class="form-outline flex-fill mb-0">
                        <input type="password" id="password-input" class="form-control" />
                        <label class="form-label" for="password-input">Password</label>
                      </div>
                    </div>
  
                    <div class="d-flex flex-row align-items-center mb-4">
                      <i class="fas fa-key fa-lg me-3 fa-fw"></i>
                      <div class="form-outline flex-fill mb-0">
                        <input type="password" id="repeat-password-input" class="form-control" />
                        <label class="form-label" for="repeat-password-input">Repeat your password</label>
                      </div>
                    </div>
  
                    <div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                      <button type="button" class="btn btn-primary btn-lg" id="register-btn">Register</button>
                    </div>
  
                  </form>
  
                </div>
                <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
  
                  <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                    class="img-fluid" alt="Sample image">
  
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="modal fade" id="error-modal" tabindex="-1" aria-labelledby="error-modal" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="error-modal">Error</h5>
          <button type="button" class="btn-close" data-mdb-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="error-modal-body"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-mdb-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="passwords-match-error-modal" tabindex="-1" aria-labelledby="passwords-match-error-modal" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="passwords-match-error-modal">Invalid Password</h5>
          <button type="button" class="btn-close" data-mdb-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">Passwords do not match</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-mdb-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const registerBtn = document.getElementById('register-btn');
    const nameInput = document.getElementById('name-input');
    const emailInput = document.getElementById('email-input');
    const passwordInput = document.getElementById('password-input');
    const repeatPasswordInput = document.getElementById('repeat-password-input');

    registerBtn.addEventListener('click', () => {
      const name = nameInput.value;
      const email = emailInput.value;
      const password = passwordInput.value;
      const repeatPassword = repeatPasswordInput.value;

      if (name === '') {
        return document.getElementById("name-input").classList.add('invalid');
      } else if (email === '') {
        return document.getElementById("email-input").classList.add('invalid');
      } else if (password === '') {
        return document.getElementById("password-input").classList.add('invalid');
      } else if (repeatPassword === '') {
        return document.getElementById("repeat-password-input").classList.add('invalid');
      }

      if (password !== repeatPassword) {
        return new mdb.Modal(document.getElementById('passwords-match-error-modal')).show();
      }

      function err(data = {}) {
        console.error(data.error);
        document.getElementById('error-modal-body').innerText = data.error;
        new mdb.Modal(document.getElementById('error-modal')).show();
        document.getElementById("name-input").classList.remove('invalid');
        document.getElementById("email-input").classList.remove('invalid');
        document.getElementById("password-input").classList.remove('invalid');
        document.getElementById("repeat-password-input").classList.remove('invalid');
      }

      fetch('/register', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email, password })
      }).then(res => res.json()).then(data => {
        if (!data.ok) return err(data);
        window.location.href = '/';
      })
      .catch(error => { err({ error }) });
    });

    document.getElementById("name-input").addEventListener('keydown', (e) => {
      if (e.key === "Enter") document.getElementById("email-input").focus();
    });

    document.getElementById("email-input").addEventListener('keydown', (e) => {
      if (e.key === "Enter") document.getElementById("password-input").focus();
    });

    document.getElementById("password-input").addEventListener('keydown', (e) => {
      if (e.key === "Enter") document.getElementById("repeat-password-input").focus();
    });

    document.getElementById("repeat-password-input").addEventListener('keydown', (e) => {
      if (e.key === "Enter") registerBtn.click();
    });

    window.onload = () => document.getElementById("name-input").focus();
  </script>
</body>
